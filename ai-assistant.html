<div class="ai-assistant">
  <div class="ai-assistant-chat">
    <div class="ai-chat-header">
      <h4>🤖 Health Assistant</h4>
      <button class="ai-chat-close" style="color:var(--white)">✕</button>
    </div>
    <div class="ai-chat-messages">
      <div class="ai-message bot">Hello! 👋 I'm your health assistant. How can I help you today?</div>
    </div>
    <div class="ai-chat-input">
      <input type="text" placeholder="Ask me anything...">
      <button>Send</button>
    </div>
  </div>
  <button class="ai-assistant-btn" aria-label="AI Assistant">🤖</button>
  <span class="ai-assistant-label">Ask Health Assistant</span>
</div>
